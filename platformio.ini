; office-co2-monitor — Adafruit ESP32 Feather V2
; CO2 / time / temp desk monitor, no WiFi dependency.

[env:featheresp32v2]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Two OTA app slots (~1.9 MB each) + SPIFFS — needed for OTA and log space.
board_build.partitions = min_spiffs.csv

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=0   ; use the sync WebServer

; Pinned in later phases; present now so the env is build-ready.
lib_deps =
    sensirion/Sensirion I2C SCD4x
    adafruit/RTClib
    adafruit/Adafruit GC9A01A
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    adafruit/Adafruit VEML7700 Library
    ricmoo/QRCode
    ayushsharma82/ElegantOTA
